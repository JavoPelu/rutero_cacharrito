<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendedores | Rutero Cacharrito</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="vendedores">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <main class="main">
        <header class="navbar">
          <div class="navbar-actions">
            <button id="mobileMenu" class="btn icon-btn mobile-menu" title="Menu">☰</button>
            <div><strong id="userName"></strong><div class="sidebar-subtitle" id="userRole"></div></div>
          </div>
          <div class="navbar-actions"><button class="btn icon-btn" data-theme-toggle title="Tema">☀</button><button id="logoutBtn" class="btn">Salir</button></div>
        </header>
        <section class="content">
          <div class="page-header">
            <div class="page-title"><h1>Vendedores</h1><p>Administra usuarios vendedores, documentos y estados.</p></div>
            <button id="newSellerBtn" class="btn btn-primary">Nuevo vendedor</button>
          </div>
          <section class="panel">
            <div class="toolbar">
              <input id="searchInput" class="input" placeholder="Buscar por nombre, usuario o documento">
              <select class="select" data-filter="activo">
                <option value="">Todos los estados</option>
                <option value="true">Activos</option>
                <option value="false">Inactivos</option>
              </select>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Nombre</th><th>Usuario</th><th>Documento</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
            <div class="pagination"><button id="prevPage" class="btn">Anterior</button><span id="pageInfo"></span><button id="nextPage" class="btn">Siguiente</button></div>
          </section>
        </section>
      </main>
    </div>
    <div id="modal" class="modal-backdrop">
      <section class="modal">
        <div class="modal-header"><h2 id="modalTitle" class="modal-title"></h2><button id="modalClose" class="btn icon-btn" type="button">×</button></div>
        <form id="modalForm"><div id="modalBody" class="modal-body"></div><div class="modal-footer"><button id="modalCancel" class="btn" type="button">Cancelar</button><button class="btn btn-primary" type="submit">Guardar</button></div></form>
      </section>
    </div>
    <div id="loader" class="loader"><div class="spinner"></div></div>
    <div id="alerts" class="alert-stack"></div>
    <script src="assets/app.js"></script>
  </body>
</html>
